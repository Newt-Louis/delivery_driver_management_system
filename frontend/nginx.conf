# HTTP — serves the full app; camera is blocked by the browser on non-HTTPS origins.
# For camera access on mobile, use HTTPS (port 3443 on the host).
server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location /api {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    location /socket.io {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS — self-signed cert generated at startup from SERVER_IP env var.
# Unlocks getUserMedia (camera) on Android/iOS.
server {
    listen 443 ssl;
    ssl_certificate     /etc/ssl/certs/frontend.crt;
    ssl_certificate_key /etc/ssl/private/frontend.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location /api {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    location /socket.io {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_cache_bypass $http_upgrade;
    }
}
